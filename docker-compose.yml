version: "3.8"

services:
  frontend:
    build:
      context: ./current
      dockerfile: ../Dockerfile.frontend
    container_name: koupii-frontend
    restart: unless-stopped
    ports:
      - "8082:3000"
    environment:
      - NODE_ENV=production
    networks:
      - koupii-network

networks:
  koupii-network:
    driver: bridge
